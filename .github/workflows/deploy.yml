# src: https://github.com/rust-lang/mdBook/wiki/Automated-Deployment%3A-GitHub-Actions
name: Deploy
on:
  push:
    branches:
      - master
  schedule:
    - cron: '0 0 * * *' # daily at midnight UTC to refresh cached OG images

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # To push a branch
      pages: write  # To push to a GitHub Pages site
      id-token: write # To update the deployment status
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install latest mdbook
        run: |
          tag=$(curl 'https://api.github.com/repos/rust-lang/mdbook/releases/latest' | jq -r '.tag_name')
          url="https://github.com/rust-lang/mdbook/releases/download/${tag}/mdbook-${tag}-x86_64-unknown-linux-gnu.tar.gz"
          mkdir mdbook
          curl -sSL $url | tar -xz --directory=./mdbook
          echo `pwd`/mdbook >> $GITHUB_PATH
      - name: Restore cached OpenGraph images
        uses: actions/cache@v4
        with:
          path: src/og-cache
          key: og-cache
      - name: Refresh OpenGraph images
        run: |
          mkdir -p src/og-cache
          repos="dais-polymtl/flock AlexsJones/llmfit yorukot/superfile esnet/iperf Chatterino/chatterino2"
          for repo in $repos; do
            name=$(echo "$repo" | tr '/' '-' | awk -F'-' '{print $NF}')
            tmp=$(mktemp)
            if curl -sSL --fail -o "$tmp" "https://opengraph.githubassets.com/1/${repo}" && [ -s "$tmp" ]; then
              mv "$tmp" "src/og-cache/${name}.png"
            else
              rm -f "$tmp"
              echo "::warning::Failed to fetch OG image for ${repo}, keeping cached version"
            fi
          done
      - name: Build Book
        run: |
          # This assumes your book is in the root of your repository.
          # Just add a `cd` here if you need to change to another directory.
          mdbook build
      - name: Setup Pages
        uses: actions/configure-pages@v4
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Upload entire repository
          path: 'book'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
